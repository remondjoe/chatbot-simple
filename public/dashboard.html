<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Asisten Sekolah</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <h1>Dashboard Pengguna</h1>
        <div id="user-info">
            <p>Memuat data...</p>
        </div>
        
        <hr style="margin: 20px 0; border: 1px dashed #8B4513;">
        
        <h3>Ganti Password</h3>
        <form id="change-password-form">
            <input type="password" id="old-password" placeholder="Password Lama" required>
            <input type="password" id="new-password" placeholder="Password Baru" required>
            <button type="submit" style="font-size: 1em; background-color: #f0ad4e;">Simpan Password</button>
        </form>
        <div id="msg-password" class="error-text" style="color: green; margin-top: 10px;"></div>

        <div class="auth-link">
            <p><a href="/">Kembali ke Chat</a></p>
        </div>
        <button id="logout-button">Logout</button>
    </div>
    <script src="/dashboard.js"></script>
</body>
</html>
