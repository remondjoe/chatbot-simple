<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SiCerdas - Asisten Sekolah</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Asisten Sekolah <span id="build-version" class="build-badge"></span></h1>
      <div id="auth-status"></div>
    </div>
    <div id="chat-box" class="chat-box"></div>
    <form id="chat-form">
      <select id="subject-select" title="Pilih Mata Pelajaran">
        <option value="sejarah">Sejarah</option>
        <option value="indonesia">B. Indonesia</option>
        <option value="matematika">Matematika</option>
        <option value="inggris">B. Inggris</option>
      </select>
      <select id="model-select" title="Pilih Model AI">
        <option value="gemini-2.5-flash" selected>Gemini 2.5 Flash</option>
        <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
        <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
      </select>
      <input type="text" id="user-input" placeholder="Tanya apa saja..." autocomplete="off" required />
      <button type="submit">➤</button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
