<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Asisten Sekolah</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <h1>Login</h1>
        <form id="login-form">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <div id="error-message" class="error-text"></div>
        <div class="auth-link">
            <p>Belum punya akun? <a href="/register.html">Daftar di sini</a></p>
            <p><a href="/forgot-password.html">Lupa Password?</a></p>
            <p><a href="/">Kembali sebagai Tamu</a></p>
            <p><a href="/apikey-guide.html" target="_blank">Bantuan API Key</a></p>
        </div>
        <div id="build-version" class="build-info-auth"></div>
    </div>
    <script src="/login.js"></script>
</body>
</html>
